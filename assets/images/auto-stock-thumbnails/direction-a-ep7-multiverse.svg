<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <!-- 다크 베이스 그라데이션: 시리즈 공통 왼쪽→오른쪽 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <!-- 악센트 글로우 (7편 고유: 멀티버스 = 겹치는 원들) -->
    <radialGradient id="glow1" cx="72%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7780EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7780EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="35%" r="28%">
      <stop offset="0%" stop-color="#58C2E8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#58C2E8" stop-opacity="0"/>
    </radialGradient>
    <!-- 왼쪽 세로 악센트 바 -->
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7780EB"/>
      <stop offset="100%" stop-color="#58C2E8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="140" fill="url(#bg)"/>

  <!-- 글로우 오버레이 (오른쪽 영역, 멀티버스 느낌) -->
  <rect width="600" height="140" fill="url(#glow1)"/>
  <rect width="600" height="140" fill="url(#glow2)"/>

  <!-- 멀티버스: 겹치는 궤도 원들 (오른쪽 장식) -->
  <circle cx="480" cy="70" r="55" fill="none" stroke="#7780EB" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 3"/>
  <circle cx="480" cy="70" r="38" fill="none" stroke="#58C2E8" stroke-width="1" stroke-opacity="0.20" stroke-dasharray="3 4"/>
  <circle cx="510" cy="55" r="44" fill="none" stroke="#7780EB" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="5 3"/>
  <circle cx="455" cy="85" r="32" fill="none" stroke="#58C2E8" stroke-width="0.8" stroke-opacity="0.18" stroke-dasharray="2 5"/>

  <!-- 멀티버스 교차점: 작은 빛나는 노드 -->
  <circle cx="491" cy="26" r="3" fill="#7780EB" fill-opacity="0.7"/>
  <circle cx="525" cy="78" r="2.5" fill="#58C2E8" fill-opacity="0.6"/>
  <circle cx="446" cy="95" r="2" fill="#7780EB" fill-opacity="0.5"/>
  <circle cx="468" cy="38" r="1.8" fill="#58C2E8" fill-opacity="0.8"/>
  <circle cx="503" cy="108" r="2.2" fill="#7780EB" fill-opacity="0.5"/>

  <!-- 노드 연결선 -->
  <line x1="491" y1="26" x2="525" y2="78" stroke="#7780EB" stroke-width="0.6" stroke-opacity="0.2"/>
  <line x1="525" y1="78" x2="503" y2="108" stroke="#58C2E8" stroke-width="0.6" stroke-opacity="0.15"/>
  <line x1="491" y1="26" x2="468" y2="38" stroke="#7780EB" stroke-width="0.6" stroke-opacity="0.2"/>
  <line x1="446" y1="95" x2="468" y2="38" stroke="#58C2E8" stroke-width="0.6" stroke-opacity="0.15"/>

  <!-- 왼쪽 세로 악센트 바 -->
  <rect x="0" y="0" width="4" height="140" fill="url(#bar)"/>

  <!-- 시리즈 뱃지 -->
  <rect x="20" y="18" width="52" height="20" rx="3" fill="#7780EB" fill-opacity="0.18"/>
  <text x="46" y="32" font-family="'Courier New', monospace" font-size="10" font-weight="700"
        fill="#7780EB" text-anchor="middle" letter-spacing="1">SERIES</text>

  <!-- 편 번호 -->
  <text x="20" y="68" font-family="'Courier New', monospace" font-size="11" font-weight="400"
        fill="#58C2E8" letter-spacing="2" opacity="0.8">EP.07</text>

  <!-- 메인 타이틀 -->
  <text x="20" y="92" font-family="'Courier New', monospace" font-size="22" font-weight="700"
        fill="#FFFFFF" letter-spacing="-0.5">MULTIVERSE</text>

  <!-- 서브 타이틀 -->
  <text x="20" y="112" font-family="'Courier New', monospace" font-size="11" font-weight="400"
        fill="#B0B0C8" letter-spacing="1">BACKTEST ENGINE</text>

  <!-- 태그들 -->
  <rect x="20" y="122" width="68" height="13" rx="2" fill="#7780EB" fill-opacity="0.15"/>
  <text x="54" y="132" font-family="'Courier New', monospace" font-size="9"
        fill="#7780EB" text-anchor="middle" letter-spacing="0.5">파라미터 최적화</text>

  <rect x="95" y="122" width="52" height="13" rx="2" fill="#58C2E8" fill-opacity="0.12"/>
  <text x="121" y="132" font-family="'Courier New', monospace" font-size="9"
        fill="#58C2E8" text-anchor="middle" letter-spacing="0.5">과적합 방지</text>

  <!-- 오른쪽 하단 장식 텍스트 -->
  <text x="580" y="130" font-family="'Courier New', monospace" font-size="9"
        fill="#2A2A40" text-anchor="end" letter-spacing="1">KIS AUTO TRADING</text>
</svg>
