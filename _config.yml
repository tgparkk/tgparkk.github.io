# Google Analytics
google_analytics: G-0797LLHMZP  # 여기에 측정 ID를 입력하세요

# 사이트 설정
title: TG's Programming Blog
description: >-
  Deep dives into C++, async multi-threading, rendering, Windows development, and game programming.
baseurl: "" # 중요: 이 값이 비어있어야 합니다
url: "https://tgparkk.github.io" 

# 빌드 설정
markdown: kramdown
highlighter: rouge
future: true  # UTC 기준 미래 날짜 포스트도 빌드

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 테마 설정
sass:
  sass_dir: _sass
  style: compressed

# 기본값
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# 저자 정보
author:
  name: tgparkk
  url: https://github.com/tgparkk
  bio: "C++, 멀티스레딩, 렌더링, 게임 프로그래밍에 대한 깊이 있는 글을 씁니다."

github_username: tgparkk

# Disqus 설정
disqus:
  shortname: tgparkk-github-io

# 소셜 공유/SEO 기본 이미지 (1200x630 권장)
# 아직 PNG가 없을 경우 SVG 폴백이 사용되지만, 일부 소셜 플랫폼은 SVG를 렌더링하지 않으므로
# 가능하면 /assets/images/og-default.png 를 생성해 교체하세요.
default_og_image: /assets/images/og-default.svg

# Google Search Console 검증 토큰
# Search Console에서 "HTML 태그" 검증 방법을 선택한 뒤 content 값을 여기에 붙여넣으세요.
# 값이 비어 있으면 메타 태그가 출력되지 않습니다.
google_site_verification: ""